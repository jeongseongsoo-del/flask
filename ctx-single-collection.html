<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CTX 단건수집</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-white p-4 text-slate-800">
    <section class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
      <div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <div>
          <p class="text-sm font-medium text-indigo-600">단건 데이터 수집</p>
          <h1 class="text-2xl font-semibold text-slate-900">CTX 단건수집</h1>
        </div>
        <div class="flex flex-wrap items-center gap-2">
          <span class="inline-flex items-center rounded-full bg-slate-200 px-3 py-1 text-xs font-semibold text-slate-700">안내</span>
           <span class="text-sm text-slate-500">앱은 브라우저 버튼으로 실행되지 않습니다. PowerShell에서 <code class="rounded bg-slate-200 px-1 py-0.5 font-mono text-xs text-slate-700">python app.py</code> 명령으로 먼저 시작하세요.</span>
        </div>
      </div>

      <div class="grid gap-4 lg:grid-cols-[1.2fr_0.8fr]">
        <div class="rounded-2xl border border-slate-200 bg-slate-50 p-5">
          <label class="mb-2 block text-sm font-medium text-slate-700" for="target">상품코드</label>
          <input id="target" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="7" placeholder="1231001" class="mb-4 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100" />

          <label class="mb-2 block text-sm font-medium text-slate-700" for="type">수집 유형</label>
          <select id="type" class="mb-4 w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
            <option>옵션상품(연관성)포함</option>
            <option>단건수집</option>
          </select>

          <button id="submit-btn" class="rounded-xl bg-indigo-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-indigo-700">
            시작하기
          </button>
          <p class="mt-3 text-xs text-slate-500">숫자만 입력하면 자동으로 정리되고, Enter 키로도 조회할 수 있습니다.</p>
        </div>

        <div class="rounded-2xl border border-slate-200 bg-white p-5">
          <h2 class="mb-3 text-lg font-semibold text-slate-900">수집 상태</h2>
          <div id="result-box" class="space-y-3 text-sm text-slate-600">
            <div class="rounded-xl bg-emerald-50 p-3 text-emerald-700">준비 완료</div>
            <div class="rounded-xl bg-slate-100 p-3">마지막 실행: 대기 중</div>
            <div class="rounded-xl bg-slate-100 p-3">대기 중인 요청: 0건</div>
          </div>

          <div class="mt-4 rounded-xl border border-slate-200 bg-slate-50 p-3">
            <div class="mb-2 text-sm font-semibold text-slate-700">요약정보</div>
            <ul id="summary-info-list" class="list-disc space-y-1 pl-5 text-xs leading-6 text-slate-700">
              <li class="text-slate-500">조회 후 요약정보가 표시됩니다.</li>
            </ul>
          </div>

          <div class="mt-4 space-y-3">
            <div>
              <label for="field-product-name" class="mb-1 block text-sm font-medium text-slate-700">상품명</label>
              <input id="field-product-name" type="text" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100" />
            </div>
            <div>
              <label for="field-brand" class="mb-1 block text-sm font-medium text-slate-700">브랜드</label>
              <input id="field-brand" type="text" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100" />
            </div>
            <div>
              <label for="field-model" class="mb-1 block text-sm font-medium text-slate-700">모델명</label>
              <input id="field-model" type="text" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100" />
            </div>
            <div>
              <label for="field-spec" class="mb-1 block text-sm font-medium text-slate-700">규격</label>
              <input id="field-spec" type="text" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100" />
            </div>
            <div>
              <label for="field-stock" class="mb-1 block text-sm font-medium text-slate-700">재고</label>
              <input id="field-stock" type="number" min="0" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100" />
            </div>
            <div>
              <label for="field-base-ship-qty" class="mb-1 block text-sm font-medium text-slate-700">기본출고수량</label>
              <input id="field-base-ship-qty" type="number" min="0" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100" />
            </div>
            <div>
              <label for="field-ship-unit" class="mb-1 block text-sm font-medium text-slate-700">출고단위</label>
              <input id="field-ship-unit" type="text" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100" />
            </div>
            <div>
              <label for="field-supply-price" class="mb-1 block text-sm font-medium text-slate-700">공급단가</label>
              <input id="field-supply-price" type="number" min="0" step="0.01" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100" />
            </div>
            <div>
              <label for="field-product-image-url" class="mb-1 block text-sm font-medium text-slate-700">상품이미지</label>
              <input id="field-product-image-url" type="text" readonly class="w-full rounded-xl border border-slate-300 bg-slate-100 px-3 py-2 text-sm text-slate-600 outline-none" placeholder="이미지 URL이 자동 입력됩니다." />
              <input id="field-img-file" type="hidden" />
              <div class="mt-2 flex h-[150px] w-[150px] items-center justify-center overflow-hidden rounded-xl border border-slate-300 bg-slate-50">
                <img id="field-product-image-preview" alt="상품 이미지 미리보기" class="hidden h-[150px] w-[150px] object-contain" />
                <span id="field-product-image-empty" class="text-xs text-slate-500">이미지 없음</span>
              </div>
            </div>
            <div>
              <label for="field-shipping-fee" class="mb-1 block text-sm font-medium text-slate-700">배송비</label>
              <input id="field-shipping-fee" type="number" min="0" step="0.01" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100" />
            </div>
          </div>
        </div>

        <div class="mt-4 rounded-xl border border-slate-200 bg-slate-50 p-3">
          <div class="mb-2 text-sm font-semibold text-slate-700">정리된 상세 HTML</div>
          <div id="clean-detail-preview" class="max-h-[420px] overflow-auto rounded-lg border border-slate-200 bg-white p-3 text-sm leading-7 text-slate-700"></div>
        </div>
      </div>

      <div class="mt-4 rounded-2xl border border-slate-200 bg-white p-5">
        <div class="mb-3 flex items-center justify-between">
          <h2 class="text-lg font-semibold text-slate-900">상세 페이지 미리보기</h2>
          <span id="iframe-status" class="text-sm text-slate-500">대기 중</span>
        </div>
        <div id="iframe-values" class="mb-3 rounded-xl border border-slate-200 bg-slate-50 p-3 text-sm text-slate-600">
          proino로 불러온 페이지에서 추출된 값이 여기에 표시됩니다.
        </div>
        <iframe id="detail-frame" title="CTX 상세 페이지" class="min-h-[520px] w-full rounded-xl border border-slate-300 bg-white"></iframe>
      </div>
    </section>

    <script>
      const submitBtn = document.getElementById('submit-btn');
      const targetInput = document.getElementById('target');
      const resultBox = document.getElementById('result-box');
      const detailFrame = document.getElementById('detail-frame');
      const iframeStatus = document.getElementById('iframe-status');
      const iframeValues = document.getElementById('iframe-values');
      const cleanDetailPreview = document.getElementById('clean-detail-preview');
      const summaryInfoList = document.getElementById('summary-info-list');
      const productImagePreview = document.getElementById('field-product-image-preview');
      const productImageEmpty = document.getElementById('field-product-image-empty');
      const CTX_RESOURCE_BASE_URL = 'https://ctx.cretec.kr/CtxApp/resource';
      const previewBaseUrl = window.location.hostname && window.location.hostname !== 'file'
        ? `${window.location.protocol}//${window.location.host}`
        : 'http://127.0.0.1:5000';

      const collectionFields = {
        productName: document.getElementById('field-product-name'),
        brand: document.getElementById('field-brand'),
        model: document.getElementById('field-model'),
        spec: document.getElementById('field-spec'),
        stock: document.getElementById('field-stock'),
        baseShipQty: document.getElementById('field-base-ship-qty'),
        shipUnit: document.getElementById('field-ship-unit'),
        supplyPrice: document.getElementById('field-supply-price'),
        productImageUrl: document.getElementById('field-product-image-url'),
        imgFile: document.getElementById('field-img-file'),
        shippingFee: document.getElementById('field-shipping-fee')
      };

      function buildProductImageUrl(imgFile) {
        const normalized = String(imgFile || '').trim();
        if (!normalized) {
          return '';
        }

        if (/^https?:\/\//i.test(normalized)) {
          return normalized;
        }

        return `${CTX_RESOURCE_BASE_URL}/${normalized.replace(/^\/+/, '')}`;
      }

      function setProductImageField(imgFile) {
        const normalizedImgFile = String(imgFile || '').trim();
        const imageUrl = buildProductImageUrl(normalizedImgFile);

        collectionFields.imgFile.value = normalizedImgFile;
        collectionFields.productImageUrl.value = imageUrl;

        if (!imageUrl) {
          productImagePreview.removeAttribute('src');
          productImagePreview.classList.add('hidden');
          productImageEmpty.textContent = '이미지 없음';
          productImageEmpty.classList.remove('hidden');
          return;
        }

        productImagePreview.src = imageUrl;
        productImagePreview.classList.remove('hidden');
        productImageEmpty.classList.add('hidden');
      }

      productImagePreview?.addEventListener('error', () => {
        productImagePreview.classList.add('hidden');
        productImageEmpty.textContent = '이미지 로드 실패';
        productImageEmpty.classList.remove('hidden');
      });

      productImagePreview?.addEventListener('load', () => {
        productImagePreview.classList.remove('hidden');
        productImageEmpty.classList.add('hidden');
      });

      function getCollectionFormData() {
        return Object.fromEntries(
          Object.entries(collectionFields).map(([key, input]) => [key, input?.value ?? ''])
        );
      }

      let latestLookupData = null;
      let iframeReadAttempt = 0;
      let autoExtractPending = false;

      function sanitizeProductCode(value) {
        return String(value || '').replace(/\D/g, '').slice(0, 7);
      }

      function formatProdCode(value) {
        const digits = sanitizeProductCode(value);
        if (digits.length <= 3) {
          return digits;
        }
        return `${digits.slice(0, 3)}-${digits.slice(3, 7)}`;
      }

      function sanitizeMarketplaceText(value) {
        return String(value || '')
          .replace(/[^0-9A-Za-z가-힣\s]/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function dedupeWords(text) {
        const words = sanitizeMarketplaceText(text).split(' ').filter(Boolean);
        const seen = new Set();
        const deduped = [];

        words.forEach((word) => {
          const key = word.toLocaleLowerCase('ko-KR');
          if (seen.has(key)) {
            return;
          }
          seen.add(key);
          deduped.push(word);
        });

        return deduped.join(' ');
      }

      function extractProductNameFromLookupData(data) {
        const item = data?.payload?.result?.items?.find((entry) => !!entry) || {};
        const brandName = sanitizeMarketplaceText(item?.brnd_nm || '');
        const itemName = sanitizeMarketplaceText(item?.item_nm || '');
        return dedupeWords([brandName, itemName].filter(Boolean).join(' '));
      }

      function toIntegerValue(value) {
        const digits = String(value ?? '').replace(/[^0-9-]/g, '');
        const parsed = Number.parseInt(digits, 10);
        return Number.isFinite(parsed) ? parsed : 0;
      }

      function escapeHtml(value) {
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function normalizeTextValue(value) {
        const normalized = String(value ?? '').trim();
        return normalized || '-';
      }

      function renderSummaryInfo(item) {
        if (!summaryInfoList) {
          return;
        }

        const messages = [];
        if (String(item?.item_use_cd || '').trim().toUpperCase() === 'E') {
          messages.push({ text: '단종' });
        }

        messages.push({ text: `stpay: ${normalizeTextValue(item?.stpay)}` });
        messages.push({ text: `recp_expt_dt: ${normalizeTextValue(item?.recp_expt_dt)}` });
        messages.push({ text: `recp_expt_dt_s1: ${normalizeTextValue(item?.recp_expt_dt_s1)}` });
        messages.push({ text: `stock_nm: ${normalizeTextValue(item?.stock_nm)}` });

        const impDelvServ = String(item?.imp_delv_serv || '').trim().toUpperCase();
        messages.push({ text: impDelvServ === 'Y' ? '대신택배' : 'CJ택배' });

        if (String(item?.rtn_imps_yn || '').trim().toUpperCase() === 'Y') {
          messages.push({ text: '반품불가상품' });
        }
        if (String(item?.imp_delv_serv_all || '').trim().toUpperCase() === 'Y') {
          messages.push({ text: '택배불가', isRed: true });
        }
        if (String(item?.no_air_trans_yn || '').trim().toUpperCase() === 'Y') {
          messages.push({ text: '항공불가' });
        }
        if (String(item?.hand_with_care_yn || '').trim().toUpperCase() === 'Y') {
          messages.push({ text: '취급주의' });
        }
        if (String(item?.online_no_sale || '').trim().toUpperCase() === 'Y') {
          messages.push({ text: '온라인판매불가', isRed: true });
        }
        if (String(item?.direct_no_sale_yn || '').trim().toUpperCase() === 'Y') {
          messages.push({ text: '직송불가' });
        }
        if (String(item?.chemi_yn || '').trim().toUpperCase() === 'Y') {
          messages.push({ text: '화평법대상' });
        }
        if (String(item?.indi_cargo_yn || '').trim().toUpperCase() === 'Y') {
          messages.push({ text: '개별화물(착불)' });
        }

        if (messages.length === 0) {
          summaryInfoList.innerHTML = '<li class="text-slate-500">표시할 요약정보가 없습니다.</li>';
          return;
        }

        summaryInfoList.innerHTML = messages
          .map((message) => `<li class="${message.isRed ? 'text-rose-600 font-semibold' : 'text-slate-700'}">${escapeHtml(message.text)}</li>`)
          .join('');
      }

      function fillProductNameFromLookupData() {
        if (!latestLookupData) {
          resultBox.innerHTML = '<div class="rounded-xl bg-amber-50 p-3 text-amber-700">먼저 상품코드 조회를 실행하세요.</div>';
          return;
        }

        const item = latestLookupData?.payload?.result?.items?.find((entry) => !!entry) || {};
        const productName = extractProductNameFromLookupData(latestLookupData);
        if (!productName) {
          resultBox.innerHTML = '<div class="rounded-xl bg-rose-50 p-3 text-rose-700">조회 JSON에서 상품명을 만들 수 없습니다.</div>';
          return;
        }

        const qties = String(item?.qties || '').split(',');
        const baseShipQty = (qties[0] || '').trim();
        const shipUnit = sanitizeMarketplaceText((qties[3] || '').trim());
        const stockTotal = toIntegerValue(item?.d1sum) + toIntegerValue(item?.s1sum);
        const supplyPrice = toIntegerValue(item?.std_unit_pric);
        const imageFile = item?.img_file || '';

        collectionFields.productName.value = productName;
        collectionFields.brand.value = sanitizeMarketplaceText(item?.brnd_nm || '');
        collectionFields.model.value = sanitizeMarketplaceText(item?.modl_no || '');
        collectionFields.spec.value = sanitizeMarketplaceText(item?.item_stdz || '');
        collectionFields.stock.value = String(stockTotal);
        collectionFields.baseShipQty.value = baseShipQty;
        collectionFields.shipUnit.value = shipUnit;
        collectionFields.supplyPrice.value = String(supplyPrice);
        setProductImageField(imageFile);
        renderSummaryInfo(item);

        Object.values(collectionFields).forEach((input) => {
          input?.dispatchEvent(new Event('input', { bubbles: true }));
        });

        resultBox.innerHTML = `
          <div class="rounded-xl bg-emerald-50 p-3 text-emerald-700">상품정보가 자동 입력되었습니다.</div>
          <div class="rounded-xl bg-slate-100 p-3">생성 상품명: ${productName}</div>
          <div class="rounded-xl bg-slate-100 p-3">브랜드: ${collectionFields.brand.value || '-'}</div>
          <div class="rounded-xl bg-slate-100 p-3">모델명: ${collectionFields.model.value || '-'}</div>
          <div class="rounded-xl bg-slate-100 p-3">규격: ${collectionFields.spec.value || '-'}</div>
          <div class="rounded-xl bg-slate-100 p-3">재고: ${collectionFields.stock.value || '0'}</div>
          <div class="rounded-xl bg-slate-100 p-3">기본출고수량/단위: ${(collectionFields.baseShipQty.value || '0')} ${collectionFields.shipUnit.value || ''}</div>
          <div class="rounded-xl bg-slate-100 p-3">공급단가: ${collectionFields.supplyPrice.value || '0'}</div>
          <div class="rounded-xl bg-slate-100 p-3">상품이미지 URL: ${collectionFields.productImageUrl.value || '-'}</div>
        `;
      }

      function sanitizeDetailHtml(html) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const detailRoot = doc.getElementById('itemDetailDiv') || doc.body;

        if (!detailRoot) {
          return '<div class="text-slate-500">itemDetailDiv 요소를 찾을 수 없습니다.</div>';
        }

        const clone = detailRoot.cloneNode(true);
        clone.querySelectorAll('script, style, link, noscript, iframe, object, embed, form, input, button, select, textarea, svg, canvas').forEach((element) => element.remove());

        clone.querySelectorAll('*').forEach((element) => {
          element.removeAttribute('style');
          element.removeAttribute('class');
          element.removeAttribute('id');
          element.removeAttribute('onclick');
          element.removeAttribute('onmouseover');
          element.removeAttribute('onmouseout');
        });

        clone.querySelectorAll('img').forEach((element) => {
          element.removeAttribute('style');
          element.removeAttribute('class');
          element.removeAttribute('id');
        });

        return clone.outerHTML;
      }

      function renderCleanDetailPreview(html) {
        const sanitized = sanitizeDetailHtml(html);
        cleanDetailPreview.innerHTML = sanitized || '<div class="text-slate-500">정리할 상세 HTML이 없습니다.</div>';
      }

      function parsePriceToInteger(value) {
        const digitsOnly = String(value ?? '').replace(/[^0-9-]/g, '');
        const parsed = Number.parseInt(digitsOnly, 10);
        return Number.isFinite(parsed) ? parsed : null;
      }

      function setShippingFeeFromIframeDoc(doc) {
        if (!doc) {
          return { checked: false, found: false, applied: false, maxFare: null, fallback: false };
        }

        const targetNode = doc.evaluate(
          '//*[@id="itemDtlTbl"]/tbody/tr[10]/td/table',
          doc,
          null,
          XPathResult.FIRST_ORDERED_NODE_TYPE,
          null
        ).singleNodeValue;

        if (!targetNode) {
          const item = latestLookupData?.payload?.result?.items?.find((entry) => !!entry) || {};
          const impDelvServ = String(item?.imp_delv_serv || '').trim().toUpperCase();
          const fallbackShippingFee = impDelvServ === 'Y' ? 5500 : 3500;
          collectionFields.shippingFee.value = String(fallbackShippingFee);
          collectionFields.shippingFee.dispatchEvent(new Event('input', { bubbles: true }));
          return { checked: true, found: false, applied: true, maxFare: fallbackShippingFee, fallback: true };
        }

        const rowNodes = Array.from(targetNode.querySelectorAll('tbody > tr, tr'));
        let maxFare = null;

        rowNodes.forEach((row) => {
          const cells = Array.from(row.querySelectorAll('td'));
          cells.forEach((cell) => {
            const fare = parsePriceToInteger(cell.textContent || '');
            if (fare === null) {
              return;
            }
            maxFare = maxFare === null ? fare : Math.max(maxFare, fare);
          });
        });

        if (maxFare === null) {
          return { checked: true, found: true, applied: false, maxFare: null, fallback: false };
        }

        collectionFields.shippingFee.value = String(maxFare);
        collectionFields.shippingFee.dispatchEvent(new Event('input', { bubbles: true }));
        return { checked: true, found: true, applied: true, maxFare, fallback: false };
      }

      function setIframeValues(frame) {
        try {
          const doc = frame.contentDocument || frame.contentWindow?.document;
          if (!doc) {
            if (iframeReadAttempt < 4) {
              iframeReadAttempt += 1;
              setTimeout(() => setIframeValues(frame), 500);
              return;
            }
            iframeStatus.textContent = '로드 불가';
            iframeValues.textContent = 'iframe 문서를 읽을 수 없습니다.';
            return;
          }

          const metaInfo = doc.getElementById('metaInfoTbl');
          if (!metaInfo && iframeReadAttempt < 10) {
            iframeReadAttempt += 1;
            iframeStatus.textContent = 'metaInfoTbl 대기 중...';
            iframeValues.textContent = '상세 페이지 데이터를 읽는 중입니다. 잠시만 기다려주세요.';
            setTimeout(() => setIframeValues(frame), 500);
            return;
          }

          iframeReadAttempt = 0;
          const shippingFeeResult = setShippingFeeFromIframeDoc(doc);
          if (metaInfo) {
            const rows = Array.from(metaInfo.querySelectorAll('tr')).map((row) => {
              const cells = row.querySelectorAll('th, td');
              const firstCellValue = (cells[0]?.textContent || '').replace(/\s+/g, ' ').trim();
              const secondCell = cells[1];
              let activeValue = '';

              if (secondCell) {
                const activeButton = secondCell.querySelector('button[data-active="Y"]');
                activeValue = (activeButton?.textContent || '').replace(/\s+/g, ' ').trim();
              }

              if (firstCellValue && activeValue) {
                return `${firstCellValue} : ${activeValue}`;
              }
              if (firstCellValue) {
                return firstCellValue;
              }
              return '';
            }).filter(Boolean);

            const metaText = rows.join('\n');
            const productCodeLine = `상품코드: ${formatProdCode(targetInput.value)}`;
            const shippingFeeLine = shippingFeeResult.applied
              ? `배송비 자동설정: ${shippingFeeResult.maxFare}`
              : shippingFeeResult.checked && shippingFeeResult.found
                ? '배송비 자동설정: 유효한 금액 없음'
                : '배송비 자동설정: 대상 테이블 없음';
            const displayText = [productCodeLine, shippingFeeLine, metaText || '테이블 내용이 비어 있습니다.'].filter(Boolean).join('\n');
            iframeValues.innerHTML = `
              <div class="mb-2 font-semibold text-slate-700">metaInfoTbl 값</div>
              <pre class="whitespace-pre-wrap break-words text-xs leading-6 text-slate-600">${displayText}</pre>
            `;
            iframeStatus.textContent = 'metaInfoTbl 접근 가능';

            if (autoExtractPending && latestLookupData) {
              autoExtractPending = false;
              fillProductNameFromLookupData();
            }

            return;
          }

          iframeValues.innerHTML = `
            <div class="mb-2 font-semibold text-slate-700">iframe 로드됨</div>
            <div class="text-xs text-slate-600">URL: ${frame.src || 'unknown'}</div>
            <div class="mt-2 text-xs text-slate-600">문서 제목: ${doc.title || '없음'}</div>
          `;
          iframeStatus.textContent = 'iframe 로드됨';

          const fieldValues = [];
          doc.querySelectorAll('input, textarea, select').forEach((element) => {
            const value = (element.value || '').trim();
            if (value) {
              fieldValues.push(`${element.name || element.id || 'field'}: ${value}`);
            }
          });

          const bodyText = doc.body?.innerText?.replace(/\s+/g, ' ').trim();
          if (fieldValues.length > 0) {
            iframeValues.innerHTML = fieldValues.slice(0, 10).map((item) => `<div>${item}</div>`).join('');
          } else if (bodyText) {
            iframeValues.textContent = bodyText.slice(0, 800);
          } else {
            iframeValues.textContent = '페이지는 로드되었지만 읽을 수 있는 값이 없습니다.';
          }

          if (shippingFeeResult.applied) {
            iframeValues.innerHTML += `<div class="mt-2 text-xs text-slate-600">배송비 자동설정: ${shippingFeeResult.maxFare}</div>`;
          }

          iframeStatus.textContent = '로드 완료';
        } catch (error) {
          if (iframeReadAttempt < 4) {
            iframeReadAttempt += 1;
            setTimeout(() => setIframeValues(frame), 500);
            return;
          }
          iframeStatus.textContent = '읽기 제한';
          iframeValues.innerHTML = `
            <div class="text-rose-600">iframe 내부 요소를 직접 읽지 못했습니다.</div>
            <div class="mt-2 text-xs text-slate-500">${error.message || '알 수 없는 오류'}</div>
          `;
          console.error(error);
        }
      }

      targetInput.addEventListener('input', (event) => {
        const cleanedValue = sanitizeProductCode(event.target.value);
        if (event.target.value !== cleanedValue) {
          event.target.value = cleanedValue;
        }
      });

      targetInput.addEventListener('paste', (event) => {
        const pastedText = event.clipboardData?.getData('text') || '';
        if (!pastedText) {
          return;
        }

        event.preventDefault();
        const cleanedValue = sanitizeProductCode(pastedText);
        const start = targetInput.selectionStart ?? targetInput.value.length;
        const end = targetInput.selectionEnd ?? start;
        const currentValue = targetInput.value;
        const nextValue = `${currentValue.slice(0, start)}${cleanedValue}${currentValue.slice(end)}`.slice(0, 7);

        targetInput.value = nextValue;
        const cursorPosition = Math.min(start + cleanedValue.length, nextValue.length);
        targetInput.setSelectionRange(cursorPosition, cursorPosition);
        targetInput.dispatchEvent(new Event('input', { bubbles: true }));
      });

      targetInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          sendCollectionRequest();
        }
      });

      async function sendCollectionRequest() {
        const target = sanitizeProductCode(targetInput.value.trim());
        const type = document.getElementById('type').value;

        if (!target) {
          resultBox.innerHTML = '<div class="rounded-xl bg-rose-50 p-3 text-rose-700">상품코드를 입력하세요.</div>';
          return;
        }

        if (submitBtn?.disabled) {
          return;
        }

        submitBtn.disabled = true;
        submitBtn.classList.add('opacity-60', 'cursor-not-allowed');
        submitBtn.textContent = '조회 중...';
        autoExtractPending = false;
        resultBox.innerHTML = '<div class="rounded-xl bg-amber-50 p-3 text-amber-700">조회 중...</div>';
        if (summaryInfoList) {
          summaryInfoList.innerHTML = '<li class="text-slate-500">조회 중...</li>';
        }

        try {
          const formData = getCollectionFormData();
          const response = await fetch(`${previewBaseUrl}/lookup-proino`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ target, type, formData })
          });

          const rawText = await response.text();
          let data = {};
          try {
            data = rawText ? JSON.parse(rawText) : {};
          } catch (error) {
            data = { message: rawText || '서버 응답을 해석할 수 없습니다.' };
          }

          if (!response.ok || !data?.success) {
            throw new Error(data?.message || '조회에 실패했습니다.');
          }

          latestLookupData = data;

          resultBox.innerHTML = `
            <div class="rounded-xl bg-emerald-50 p-3 text-emerald-700">${data.message}</div>
            <div class="rounded-xl bg-slate-100 p-3">상품코드: ${data.target || '없음'}</div>
            <div class="rounded-xl bg-slate-100 p-3">proino: ${data.proino ?? '없음'}</div>
            <div class="rounded-xl bg-slate-100 p-3">조회 유형: ${type}</div>
            <div class="rounded-xl bg-slate-100 p-3">입력값: ${JSON.stringify(getCollectionFormData())}</div>
            <div class="rounded-xl bg-slate-100 p-3">
              <div class="mb-2 font-semibold text-slate-700">전체 JSON 응답</div>
              <pre class="max-h-[320px] overflow-auto whitespace-pre-wrap break-words text-xs leading-6 text-slate-600">${JSON.stringify(data, null, 2)}</pre>
            </div>
          `;

          if (data.proino) {
            autoExtractPending = true;
            iframeStatus.textContent = '로딩 중...';
            iframeValues.textContent = '상세 페이지를 불러오는 중입니다.';

            try {
              const detailResponse = await fetch(`${previewBaseUrl}/item-detail?itemCd=${encodeURIComponent(data.proino)}`);
              const detailHtml = await detailResponse.text();
              renderCleanDetailPreview(detailHtml);
              detailFrame.srcdoc = detailHtml;
            } catch (error) {
              detailFrame.src = `${previewBaseUrl}/item-detail?itemCd=${encodeURIComponent(data.proino)}`;
              console.error(error);
            }
          }
        } catch (error) {
          resultBox.innerHTML = `
            <div class="rounded-xl bg-rose-50 p-3 text-rose-700">${error.message || '연결 실패: Flask 서버가 실행 중인지 확인하세요.'}</div>
          `;
          if (summaryInfoList) {
            summaryInfoList.innerHTML = '<li class="text-rose-600">요약정보를 불러오지 못했습니다.</li>';
          }
          console.error(error);
        } finally {
          submitBtn.disabled = false;
          submitBtn.classList.remove('opacity-60', 'cursor-not-allowed');
          submitBtn.textContent = '시작하기';
        }
      }

      detailFrame.addEventListener('load', () => {
        setIframeValues(detailFrame);
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tailwind UI Layout</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-800">
    <div class="min-h-screen flex flex-col">
      <header class="sticky top-0 z-10 border-b border-slate-200 bg-white/90 backdrop-blur">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4 lg:px-8">
          <div class="flex items-center gap-3">
            <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-indigo-600 to-violet-500 font-bold text-white">
              UI
            </div>
            <span class="text-lg font-semibold">Smart Dashboard</span>
          </div>

          <nav class="flex gap-5 text-sm font-medium text-slate-600">
            <a href="#" class="transition hover:text-indigo-600">Overview</a>
            <a href="#" class="transition hover:text-indigo-600">Projects</a>
            <a href="#" class="transition hover:text-indigo-600">Reports</a>
            <a href="#" class="transition hover:text-indigo-600">Settings</a>
          </nav>
        </div>
      </header>

      <section class="mx-auto grid w-full max-w-7xl flex-1 gap-6 px-4 py-6 md:grid-cols-[240px_1fr] md:px-6 lg:px-8">
        <aside class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
          <h3 class="mb-4 text-sm font-semibold uppercase tracking-wide text-slate-500">Menu</h3>
          <div class="flex flex-col gap-2" id="sidebar-menu">
            <a href="#" data-page="dashboard" class="menu-link rounded-xl bg-indigo-50 px-3 py-2 font-semibold text-indigo-600">대시보드</a>
            <a href="#" data-page="ctx" class="menu-link rounded-xl px-3 py-2 text-slate-700 transition hover:bg-slate-100">CTX 단건수집</a>
            <a href="#" data-page="stats" class="menu-link rounded-xl px-3 py-2 text-slate-700 transition hover:bg-slate-100">통계</a>
            <a href="#" data-page="alerts" class="menu-link rounded-xl px-3 py-2 text-slate-700 transition hover:bg-slate-100">알림</a>
            <a href="#" data-page="help" class="menu-link rounded-xl px-3 py-2 text-slate-700 transition hover:bg-slate-100">도움말</a>
          </div>
        </aside>

        <main class="flex flex-col gap-6" id="page-content"></main>
      </section>

      <footer class="border-t border-slate-200 bg-slate-900 py-4 text-center text-sm text-slate-300">
        © 2026 Smart Dashboard. All rights reserved.
      </footer>
    </div>

    <script>
      const pageContent = document.getElementById('page-content');
      const menuLinks = document.querySelectorAll('.menu-link');
      const previewBaseUrl = window.location.hostname && window.location.hostname !== 'file'
        ? `${window.location.protocol}//${window.location.host}`
        : 'http://127.0.0.1:5000';

      const pages = {
        dashboard: {
          title: '대시보드',
          subtitle: '핵심 정보를 한눈에 확인하세요.',
          description: '이 영역은 선택한 메뉴에 맞는 새로운 페이지로 바뀝니다.'
        },
        ctx: {
          title: 'CTX 단건수집',
          subtitle: '단건 데이터를 빠르게 수집할 수 있습니다.',
          description: '새로운 페이지가 생성되어 빈 화면 기반의 작업 영역으로 사용할 수 있습니다.'
        },
        stats: {
          title: '통계',
          subtitle: '수집 결과와 현황을 분석해보세요.',
          description: '여기에 차트나 표가 들어갈 수 있는 빈 페이지가 생성됩니다.'
        },
        alerts: {
          title: '알림',
          subtitle: '중요한 사건을 바로 확인하세요.',
          description: '알림 목록 또는 상태 메시지를 배치하는 빈 페이지입니다.'
        },
        help: {
          title: '도움말',
          subtitle: '문서와 가이드를 확인하세요.',
          description: '도움말 콘텐츠를 위한 공백 페이지입니다.'
        }
      };

      function escapeHtml(value) {
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function normalizeCell(value) {
        const text = String(value ?? '').trim();
        return text ? escapeHtml(text) : '-';
      }

      function sanitizeExplainHtml(rawHtml) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(String(rawHtml || ''), 'text/html');
        doc.querySelectorAll('script, style, iframe, object, embed, form, input, button, select, textarea, noscript').forEach((element) => {
          element.remove();
        });

        doc.querySelectorAll('*').forEach((element) => {
          Array.from(element.attributes).forEach((attribute) => {
            const attrName = attribute.name.toLowerCase();
            const attrValue = String(attribute.value || '').trim().toLowerCase();
            if (attrName.startsWith('on')) {
              element.removeAttribute(attribute.name);
              return;
            }
            if ((attrName === 'href' || attrName === 'src') && attrValue.startsWith('javascript:')) {
              element.removeAttribute(attribute.name);
              return;
            }
            if (attrName === 'style') {
              element.removeAttribute(attribute.name);
            }
          });
        });

        return (doc.body?.innerHTML || '').trim();
      }

      function createDetailFieldEditor(field, value) {
        const safeField = escapeHtml(field);
        const normalizedValue = value === null || value === undefined ? '' : String(value);
        const escapedValue = escapeHtml(normalizedValue);
        const useTextArea = normalizedValue.length > 120 || ['it_explan', 'it_info_value'].includes(field);

        if (useTextArea) {
          return `
            <tr class="border-b border-slate-100 align-top">
              <th class="w-[220px] px-3 py-2 text-left text-xs font-semibold text-slate-600">${safeField}</th>
              <td class="px-3 py-2">
                <textarea data-detail-field="${safeField}" rows="4" class="w-full rounded-lg border border-slate-300 px-2 py-1 text-xs text-slate-700">${escapedValue}</textarea>
              </td>
            </tr>
          `;
        }

        const readOnlyAttr = field === 'it_id' ? 'readonly' : '';
        const readOnlyClass = field === 'it_id' ? 'bg-slate-100 text-slate-500' : '';
        return `
          <tr class="border-b border-slate-100 align-top">
            <th class="w-[220px] px-3 py-2 text-left text-xs font-semibold text-slate-600">${safeField}</th>
            <td class="px-3 py-2">
              <input data-detail-field="${safeField}" value="${escapedValue}" ${readOnlyAttr} class="w-full rounded-lg border border-slate-300 px-2 py-1 text-xs text-slate-700 ${readOnlyClass}" />
            </td>
          </tr>
        `;
      }

      async function renderStatsPage() {
        pageContent.innerHTML = `
          <section class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
            <div class="mb-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
              <div>
                <p class="text-sm font-medium text-indigo-600">수집 결과 목록</p>
                <h1 class="text-2xl font-semibold text-slate-900">통계</h1>
              </div>
              <div class="flex items-center gap-2">
                <button id="stats-refresh-btn" class="rounded-xl border border-slate-200 px-4 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-100">새로고침</button>
                <span id="stats-selected-count" class="text-sm text-slate-500">선택 0건</span>
              </div>
            </div>

            <div class="mb-4 grid gap-3 rounded-2xl border border-slate-200 bg-slate-50 p-3 md:grid-cols-[180px_1fr_auto_auto]">
              <input id="stats-search-item-id" placeholder="상품코드(일치)" class="rounded-xl border border-slate-300 px-3 py-2 text-sm" />
              <input id="stats-search-item-name" placeholder="상품명(like)" class="rounded-xl border border-slate-300 px-3 py-2 text-sm" />
              <button id="stats-search-btn" class="rounded-xl bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-700">검색</button>
              <button id="stats-search-reset-btn" class="rounded-xl border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100">초기화</button>
            </div>

            <div id="stats-content" class="rounded-2xl border border-slate-200 bg-slate-50 p-4 text-sm text-slate-600">목록을 불러오는 중...</div>
            <div id="stats-pagination" class="mt-3 flex items-center justify-between text-sm text-slate-600"></div>
          </section>
          <div id="stats-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/60 p-4">
            <div class="max-h-[88vh] w-full max-w-4xl overflow-hidden rounded-2xl bg-white shadow-2xl">
              <div class="flex items-center justify-between border-b border-slate-200 px-4 py-3">
                <h3 id="stats-modal-title" class="text-base font-semibold text-slate-900">상세 보기</h3>
                <button id="stats-modal-close" type="button" class="rounded-lg border border-slate-200 px-3 py-1.5 text-xs text-slate-600 hover:bg-slate-100">닫기</button>
              </div>
              <div id="stats-modal-body" class="max-h-[74vh] overflow-auto p-4 text-sm text-slate-700"></div>
            </div>
          </div>

          <div id="stats-item-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/60 p-4">
            <div class="max-h-[92vh] w-full max-w-5xl overflow-hidden rounded-2xl bg-white shadow-2xl">
              <div class="flex items-center justify-between border-b border-slate-200 px-4 py-3">
                <h3 id="stats-item-modal-title" class="text-base font-semibold text-slate-900">상품 상세</h3>
                <button id="stats-item-modal-close" type="button" class="rounded-lg border border-slate-200 px-3 py-1.5 text-xs text-slate-600 hover:bg-slate-100">닫기</button>
              </div>
              <div id="stats-item-modal-body" class="max-h-[72vh] overflow-auto p-4 text-sm text-slate-700"></div>
              <div class="flex items-center justify-end gap-2 border-t border-slate-200 px-4 py-3">
                <button id="stats-item-delete-btn" type="button" class="rounded-lg border border-rose-300 px-3 py-1.5 text-xs font-semibold text-rose-600 hover:bg-rose-50">삭제</button>
                <button id="stats-item-save-btn" type="button" class="rounded-lg bg-emerald-600 px-3 py-1.5 text-xs font-semibold text-white hover:bg-emerald-700">수정 저장</button>
              </div>
            </div>
          </div>
        `;

        const statsContent = document.getElementById('stats-content');
        const statsPagination = document.getElementById('stats-pagination');
        const selectedCountLabel = document.getElementById('stats-selected-count');
        const refreshBtn = document.getElementById('stats-refresh-btn');
        const searchItemIdInput = document.getElementById('stats-search-item-id');
        const searchItemNameInput = document.getElementById('stats-search-item-name');
        const searchBtn = document.getElementById('stats-search-btn');
        const searchResetBtn = document.getElementById('stats-search-reset-btn');
        const statsModal = document.getElementById('stats-modal');
        const statsModalTitle = document.getElementById('stats-modal-title');
        const statsModalBody = document.getElementById('stats-modal-body');
        const statsModalClose = document.getElementById('stats-modal-close');
        const statsItemModal = document.getElementById('stats-item-modal');
        const statsItemModalTitle = document.getElementById('stats-item-modal-title');
        const statsItemModalBody = document.getElementById('stats-item-modal-body');
        const statsItemModalClose = document.getElementById('stats-item-modal-close');
        const statsItemSaveBtn = document.getElementById('stats-item-save-btn');
        const statsItemDeleteBtn = document.getElementById('stats-item-delete-btn');

        const statsState = {
          page: 1,
          pageSize: 30,
          totalPages: 1,
          totalCount: 0,
          itemId: '',
          itemName: ''
        };

        let latestStatsRows = [];
        let activeDetailItemId = '';

        const closeModal = () => {
          statsModal?.classList.add('hidden');
          statsModal?.classList.remove('flex');
          if (statsModalBody) {
            statsModalBody.innerHTML = '';
          }
        };

        const openExplainModal = (row) => {
          const rawExplain = String(row?.it_explan || '').trim();
          const sanitizedHtml = sanitizeExplainHtml(rawExplain);
          statsModalTitle.textContent = `it_explan 보기 - ${row?.it_id || '-'}`;
          statsModalBody.innerHTML = sanitizedHtml || '<div class="text-slate-500">표시할 상세 HTML이 없습니다.</div>';
          statsModal?.classList.remove('hidden');
          statsModal?.classList.add('flex');
        };

        const openImageModal = (row) => {
          const imageUrl = String(row?.it_1 || '').trim();
          statsModalTitle.textContent = `it_1 이미지 보기 - ${row?.it_id || '-'}`;
          statsModalBody.innerHTML = '';

          if (!imageUrl) {
            statsModalBody.innerHTML = '<div class="text-slate-500">이미지 URL이 없습니다.</div>';
          } else {
            const image = document.createElement('img');
            image.src = imageUrl;
            image.alt = '상품 이미지';
            image.className = 'mx-auto max-h-[62vh] w-auto rounded-lg border border-slate-200 bg-white object-contain';

            const urlLink = document.createElement('a');
            urlLink.href = imageUrl;
            urlLink.target = '_blank';
            urlLink.rel = 'noreferrer noopener';
            urlLink.className = 'mt-3 block break-all text-xs text-indigo-600 hover:underline';
            urlLink.textContent = imageUrl;

            statsModalBody.appendChild(image);
            statsModalBody.appendChild(urlLink);
          }

          statsModal?.classList.remove('hidden');
          statsModal?.classList.add('flex');
        };

        statsModalClose?.addEventListener('click', () => {
          closeModal();
        });

        statsModal?.addEventListener('click', (event) => {
          if (event.target === statsModal) {
            closeModal();
          }
        });

        const closeItemModal = () => {
          statsItemModal?.classList.add('hidden');
          statsItemModal?.classList.remove('flex');
          if (statsItemModalBody) {
            statsItemModalBody.innerHTML = '';
          }
          activeDetailItemId = '';
        };

        statsItemModalClose?.addEventListener('click', () => {
          closeItemModal();
        });

        statsItemModal?.addEventListener('click', (event) => {
          if (event.target === statsItemModal) {
            closeItemModal();
          }
        });

        const buildStatsQueryString = () => {
          const params = new URLSearchParams();
          params.set('page', String(statsState.page));
          params.set('pageSize', String(statsState.pageSize));
          if (statsState.itemId) {
            params.set('itemId', statsState.itemId);
          }
          if (statsState.itemName) {
            params.set('itemName', statsState.itemName);
          }
          return params.toString();
        };

        const renderPagination = () => {
          const disablePrev = statsState.page <= 1 ? 'disabled' : '';
          const disableNext = statsState.page >= statsState.totalPages ? 'disabled' : '';
          statsPagination.innerHTML = `
            <div>총 ${statsState.totalCount}건 / 페이지 ${statsState.page} / ${statsState.totalPages}</div>
            <div class="flex items-center gap-2">
              <button id="stats-page-prev" ${disablePrev} class="rounded-lg border border-slate-300 px-3 py-1 text-xs font-semibold text-slate-700 disabled:cursor-not-allowed disabled:opacity-40">이전</button>
              <button id="stats-page-next" ${disableNext} class="rounded-lg border border-slate-300 px-3 py-1 text-xs font-semibold text-slate-700 disabled:cursor-not-allowed disabled:opacity-40">다음</button>
            </div>
          `;

          document.getElementById('stats-page-prev')?.addEventListener('click', () => {
            if (statsState.page <= 1) {
              return;
            }
            statsState.page -= 1;
            loadStats();
          });

          document.getElementById('stats-page-next')?.addEventListener('click', () => {
            if (statsState.page >= statsState.totalPages) {
              return;
            }
            statsState.page += 1;
            loadStats();
          });
        };

        const openItemDetailModal = async (itemId) => {
          if (!itemId) {
            return;
          }

          activeDetailItemId = String(itemId);
          statsItemModalTitle.textContent = `상품 상세 - ${activeDetailItemId}`;
          statsItemModalBody.innerHTML = '상세 데이터를 불러오는 중...';
          statsItemModal?.classList.remove('hidden');
          statsItemModal?.classList.add('flex');

          try {
            const response = await fetch(`${previewBaseUrl}/stats-item/${encodeURIComponent(activeDetailItemId)}`);
            const data = await response.json();
            if (!response.ok || !data?.success) {
              throw new Error(data?.message || '상세 조회에 실패했습니다.');
            }

            const item = data.item || {};
            const fieldRows = Object.entries(item).map(([field, value]) => createDetailFieldEditor(field, value)).join('');
            statsItemModalBody.innerHTML = `
              <div class="mb-2 text-xs text-slate-500">it_id를 제외한 모든 필드는 수정 가능합니다.</div>
              <div class="overflow-auto rounded-xl border border-slate-200 bg-white">
                <table class="min-w-full text-xs">${fieldRows}</table>
              </div>
            `;
          } catch (error) {
            statsItemModalBody.innerHTML = `<div class="text-rose-600">${escapeHtml(error.message || '상세 조회에 실패했습니다.')}</div>`;
          }
        };

        const collectDetailFormData = () => {
          const payload = {};
          statsItemModalBody.querySelectorAll('[data-detail-field]').forEach((inputElement) => {
            const field = inputElement.getAttribute('data-detail-field');
            if (!field) {
              return;
            }
            payload[field] = inputElement.value;
          });
          return payload;
        };

        statsItemSaveBtn?.addEventListener('click', async () => {
          if (!activeDetailItemId) {
            return;
          }

          const payload = collectDetailFormData();
          statsItemSaveBtn.disabled = true;
          statsItemSaveBtn.textContent = '저장 중...';

          try {
            const response = await fetch(`${previewBaseUrl}/stats-item/${encodeURIComponent(activeDetailItemId)}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ item: payload })
            });
            const data = await response.json();
            if (!response.ok || !data?.success) {
              throw new Error(data?.message || '수정에 실패했습니다.');
            }

            closeItemModal();
            await loadStats();
          } catch (error) {
            alert(error.message || '수정에 실패했습니다.');
          } finally {
            statsItemSaveBtn.disabled = false;
            statsItemSaveBtn.textContent = '수정 저장';
          }
        });

        statsItemDeleteBtn?.addEventListener('click', async () => {
          if (!activeDetailItemId) {
            return;
          }
          const confirmed = confirm(`상품코드 ${activeDetailItemId} 데이터를 삭제하시겠습니까?`);
          if (!confirmed) {
            return;
          }

          statsItemDeleteBtn.disabled = true;
          statsItemDeleteBtn.textContent = '삭제 중...';
          try {
            const response = await fetch(`${previewBaseUrl}/stats-item/${encodeURIComponent(activeDetailItemId)}`, {
              method: 'DELETE'
            });
            const data = await response.json();
            if (!response.ok || !data?.success) {
              throw new Error(data?.message || '삭제에 실패했습니다.');
            }

            closeItemModal();
            await loadStats();
          } catch (error) {
            alert(error.message || '삭제에 실패했습니다.');
          } finally {
            statsItemDeleteBtn.disabled = false;
            statsItemDeleteBtn.textContent = '삭제';
          }
        });

        const loadStats = async () => {
          statsContent.textContent = '목록을 불러오는 중...';
          try {
            const response = await fetch(`${previewBaseUrl}/stats-items?${buildStatsQueryString()}`);
            const data = await response.json();
            if (!response.ok || !data?.success) {
              throw new Error(data?.message || '통계 목록 조회에 실패했습니다.');
            }

            const rows = Array.isArray(data.items) ? data.items : [];
            statsState.totalCount = Number.parseInt(data.totalCount || 0, 10) || 0;
            statsState.totalPages = Number.parseInt(data.totalPages || 1, 10) || 1;
            statsState.page = Number.parseInt(data.page || statsState.page, 10) || 1;
            latestStatsRows = rows;
            if (rows.length === 0) {
              statsContent.innerHTML = '<div class="text-slate-500">저장된 데이터가 없습니다.</div>';
              selectedCountLabel.textContent = '선택 0건';
              renderPagination();
              return;
            }

            const bodyRows = rows.map((row, rowIndex) => {
              const explainLink = String(row?.it_explan || '').trim()
                ? `<button type="button" class="stats-view-link text-indigo-600 hover:underline" data-view-type="explain" data-row-index="${rowIndex}">[보기]</button>`
                : '-';
              const imageLink = String(row?.it_1 || '').trim()
                ? `<button type="button" class="stats-view-link text-indigo-600 hover:underline" data-view-type="image" data-row-index="${rowIndex}">[보기]</button>`
                : '-';
              const itemIdLink = `<button type="button" class="stats-item-detail-link font-semibold text-indigo-600 hover:underline" data-item-id="${escapeHtml(row.it_id)}">${normalizeCell(row.it_id)}</button>`;

              return `
              <tr class="border-b border-slate-100 align-top">
                <td class="px-3 py-2 text-center"><input type="checkbox" class="stats-row-checkbox h-4 w-4 rounded border-slate-300" data-item-id="${escapeHtml(row.it_id)}" /></td>
                <td class="px-3 py-2 font-medium text-slate-800">${itemIdLink}</td>
                <td class="px-3 py-2">${normalizeCell(row.it_name)}</td>
                <td class="px-3 py-2">${normalizeCell(row.it_seo_title)}</td>
                <td class="px-3 py-2">${normalizeCell(row.it_brand)}</td>
                <td class="px-3 py-2">${normalizeCell(row.it_model)}</td>
                <td class="px-3 py-2">${normalizeCell(row.it_basic)}</td>
                <td class="px-3 py-2 text-center">${explainLink}</td>
                <td class="px-3 py-2 text-right">${normalizeCell(row.it_price)}</td>
                <td class="px-3 py-2 text-right">${normalizeCell(row.it_stock_qty)}</td>
                <td class="px-3 py-2">${normalizeCell(row.it_shop_memo)}</td>
                <td class="px-3 py-2 text-center">${normalizeCell(row.it_sc_type)}</td>
                <td class="px-3 py-2 text-right">${normalizeCell(row.it_sc_price)}</td>
                <td class="px-3 py-2 text-center">${imageLink}</td>
              </tr>
            `;
            }).join('');

            statsContent.innerHTML = `
              <div class="mb-2 text-xs text-slate-500">현재 페이지 ${rows.length}건</div>
              <div class="overflow-auto rounded-xl border border-slate-200 bg-white">
                <table class="min-w-[1800px] text-xs leading-5 text-slate-700">
                  <thead class="sticky top-0 bg-slate-100 text-slate-600">
                    <tr>
                      <th class="px-3 py-2 text-center"><input type="checkbox" id="stats-select-all" class="h-4 w-4 rounded border-slate-300" /></th>
                      <th class="px-3 py-2 text-left">it_id</th>
                      <th class="px-3 py-2 text-left">it_name</th>
                      <th class="px-3 py-2 text-left">it_seo_title</th>
                      <th class="px-3 py-2 text-left">it_brand</th>
                      <th class="px-3 py-2 text-left">it_model</th>
                      <th class="px-3 py-2 text-left">it_basic</th>
                      <th class="px-3 py-2 text-left">it_explan</th>
                      <th class="px-3 py-2 text-right">it_price</th>
                      <th class="px-3 py-2 text-right">it_stock_qty</th>
                      <th class="px-3 py-2 text-left">it_shop_memo</th>
                      <th class="px-3 py-2 text-center">it_sc_type</th>
                      <th class="px-3 py-2 text-right">it_sc_price</th>
                      <th class="px-3 py-2 text-left">it_1</th>
                    </tr>
                  </thead>
                  <tbody>${bodyRows}</tbody>
                </table>
              </div>
            `;

            const selectAll = document.getElementById('stats-select-all');
            const checkboxes = Array.from(document.querySelectorAll('.stats-row-checkbox'));
            const syncSelectedCount = () => {
              const selectedCount = checkboxes.filter((checkbox) => checkbox.checked).length;
              selectedCountLabel.textContent = `선택 ${selectedCount}건`;
            };

            selectAll?.addEventListener('change', () => {
              checkboxes.forEach((checkbox) => {
                checkbox.checked = selectAll.checked;
              });
              syncSelectedCount();
            });

            checkboxes.forEach((checkbox) => {
              checkbox.addEventListener('change', () => {
                const allChecked = checkboxes.length > 0 && checkboxes.every((item) => item.checked);
                if (selectAll) {
                  selectAll.checked = allChecked;
                }
                syncSelectedCount();
              });
            });

            statsContent.querySelectorAll('.stats-view-link').forEach((linkElement) => {
              linkElement.addEventListener('click', () => {
                const rowIndex = Number.parseInt(linkElement.getAttribute('data-row-index') || '-1', 10);
                if (!Number.isFinite(rowIndex) || rowIndex < 0 || rowIndex >= latestStatsRows.length) {
                  return;
                }
                const row = latestStatsRows[rowIndex];
                const viewType = linkElement.getAttribute('data-view-type');
                if (viewType === 'explain') {
                  openExplainModal(row);
                  return;
                }
                if (viewType === 'image') {
                  openImageModal(row);
                }
              });
            });

            statsContent.querySelectorAll('.stats-item-detail-link').forEach((linkElement) => {
              linkElement.addEventListener('click', () => {
                const itemId = linkElement.getAttribute('data-item-id') || '';
                openItemDetailModal(itemId);
              });
            });

            syncSelectedCount();
            renderPagination();
          } catch (error) {
            statsContent.innerHTML = `<div class="text-rose-600">${escapeHtml(error.message || '통계 목록을 불러오지 못했습니다.')}</div>`;
            selectedCountLabel.textContent = '선택 0건';
            statsPagination.innerHTML = '';
          }
        };

        refreshBtn?.addEventListener('click', () => {
          loadStats();
        });

        searchBtn?.addEventListener('click', () => {
          statsState.itemId = String(searchItemIdInput?.value || '').trim();
          statsState.itemName = String(searchItemNameInput?.value || '').trim();
          statsState.page = 1;
          loadStats();
        });

        searchResetBtn?.addEventListener('click', () => {
          if (searchItemIdInput) {
            searchItemIdInput.value = '';
          }
          if (searchItemNameInput) {
            searchItemNameInput.value = '';
          }
          statsState.itemId = '';
          statsState.itemName = '';
          statsState.page = 1;
          loadStats();
        });

        searchItemIdInput?.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') {
            event.preventDefault();
            searchBtn?.click();
          }
        });

        searchItemNameInput?.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') {
            event.preventDefault();
            searchBtn?.click();
          }
        });

        await loadStats();
      }

      async function renderPage(pageKey) {
        const page = pages[pageKey] || pages.dashboard;

        if (pageKey === 'ctx') {
          pageContent.innerHTML = `
            <section class="rounded-3xl border border-slate-200 bg-white p-3 shadow-sm">
              <iframe src="ctx-single-collection.html" class="min-h-[620px] w-full rounded-2xl border-0"></iframe>
            </section>
          `;
          return;
        }

        if (pageKey === 'stats') {
          await renderStatsPage();
          return;
        }

        pageContent.innerHTML = `
          <section class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
            <div class="mb-6 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
              <div>
                <p class="text-sm font-medium text-indigo-600">${page.subtitle}</p>
                <h1 class="text-2xl font-semibold text-slate-900">${page.title}</h1>
              </div>
              <button class="rounded-xl border border-slate-200 px-4 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-100">
                새 페이지 열기
              </button>
            </div>

            <div class="min-h-[360px] rounded-2xl border border-dashed border-slate-300 bg-slate-50 p-6">
              <p class="text-sm leading-7 text-slate-600">${page.description}</p>
              <div class="mt-6 flex flex-wrap items-center gap-3">
                <span class="inline-flex items-center rounded-full bg-slate-200 px-3 py-1 text-xs font-semibold text-slate-700">안내</span>
                <span class="text-sm text-slate-500">앱 실행은 브라우저 버튼으로 처리할 수 없습니다. PowerShell에서 <code class="rounded bg-slate-200 px-1 py-0.5 font-mono text-xs text-slate-700">python app.py</code> 명령으로 먼저 시작하세요.</span>
              </div>
              <div class="mt-6 grid gap-4 md:grid-cols-2">
                <div class="h-24 rounded-xl border border-slate-200 bg-white"></div>
                <div class="h-24 rounded-xl border border-slate-200 bg-white"></div>
              </div>
            </div>
          </section>
        `;
      }

      menuLinks.forEach((link) => {
        link.addEventListener('click', (event) => {
          event.preventDefault();
          menuLinks.forEach((item) => {
            item.classList.remove('bg-indigo-50', 'font-semibold', 'text-indigo-600');
            item.classList.add('text-slate-700');
          });

          link.classList.add('bg-indigo-50', 'font-semibold', 'text-indigo-600');
          link.classList.remove('text-slate-700');
          renderPage(link.dataset.page);
        });
      });

      renderPage('dashboard');
    </script>
  </body>
</html>
